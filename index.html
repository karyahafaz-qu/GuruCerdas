      // --- AI FETCHER DENGAN AUTO-FALLBACK YANG DISEMPURNAKAN ---
      const generateWithAI = async (prompt, schema, maxRetries = 5, imageData = null) => {
        const currentKey = apiKey;

        // Daftar model resmi Google yang mendukung fitur lengkap (JSON Schema)
        const modelsToTry = ['gemini-2.5-flash-preview-09-2025'];

        const parts = [{ text: prompt }];
        if (imageData) parts.push(imageData);

        const payload = {
          contents: [{ parts: parts }],
          systemInstruction: { 
            parts: [{ text: "Anda adalah asisten pendidik ahli berbahasa Indonesia yang bertugas membuat perangkat pembelajaran yang akurat, terstruktur, tidak ambigu, dan sangat terampil menyisipkan nilai-nilai karakter serta nilai Islami secara natural." }] 
          },
          generationConfig: { responseMimeType: "application/json", responseSchema: schema }
        };

        const delays = [1000, 2000, 4000, 8000];
        let lastErrorMsg = "";

        for (let modelName of modelsToTry) {
            for (let i = 0; i < maxRetries; i++) {
              try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/${modelName}:generateContent?key=${currentKey}`, {
                  method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload)
                });
                
                if (!response.ok) {
                  const errText = await response.text();
                  let errorReason = `Error ${response.status}`;
                  try {
                      const errObj = JSON.parse(errText);
                      if (errObj.error && errObj.error.message) errorReason = errObj.error.message;
                  } catch(e) {}
                  
                  if (response.status === 400 || response.status === 403) {
                     throw new Error(`API Key Anda tidak memiliki izin atau salah. Pastikan API Key benar dan Anda membuatnya di Google AI Studio.`);
                  }
                  if (response.status === 404) {
                     throw new Error('MODEL_NOT_FOUND');
                  }
                  throw new Error(`Gagal (Server AI): ${errorReason}`);
                }

                const data = await response.json();
                let responseText = data.candidates[0].content.parts[0].text.trim();
                if (responseText.startsWith('```')) {
                    responseText = responseText.replace(/^```(json)?\n/, '').replace(/\n```$/, '');
                }
                return JSON.parse(responseText);
              } catch (err) {
                if (err.message === 'MODEL_NOT_FOUND') {
                    lastErrorMsg = `Model ${modelName} tidak tersedia. Mencoba model lain...`;
                    break; // Pindah ke model berikutnya di array modelsToTry
                }
                if (err.message.includes('API Key')) {
                    throw err; // Stop total jika API Key salah
                }
                lastErrorMsg = err.message;
                if (i === maxRetries - 1) break;
                await delay(delays[i] || 2000);
              }
            }
        }
        throw new Error(`Semua percobaan ke server AI gagal. Pesan sistem: ${lastErrorMsg}`);
      };

                        </p>
                        <p className="text-slate-600 text-sm mt-3 font-semibold">Alokasi Waktu: {identitas.jumlahPertemuan}</p>
                      </div>
                      <div className="space-y-8">
                        <section>
                          <h3 className="text-lg font-bold text-slate-800 border-l-4 border-emerald-600 pl-3 mb-4">A. Tujuan Pembelajaran</h3>
                          <ul className="list-disc pl-6 space-y-2 text-slate-700" dir="auto">{generatedModul.tujuan.map((t, i) => <li key={i}>{t}</li>)}</ul>
                        </section>
                        <section>
                          <h3 className="text-lg font-bold text-slate-800 border-l-4 border-teal-600 pl-3 mb-4">B. Skenario Kegiatan (TERPADU)</h3>
                          <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {Object.entries(generatedModul.kegiatan_terpadu).map(([key, val]) => (
                              <div key={key} className={`p-5 rounded-xl border ${key === 'ukhrawi' || key === 'duniawi' ? 'bg-teal-50 border-teal-200 col-span-1 md:col-span-2' : 'bg-slate-50 border-slate-200'}`}>
                                <h4 className="font-bold text-slate-800 capitalize mb-2">{key}</h4>
                                <p className="text-sm text-slate-600 leading-relaxed" dir="auto">{val}</p>
                              </div>
                            ))}
                          </div>
                        </section>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}
            
            {activeTab === 'lkpd' && (
              <div className="space-y-6">
                <div className="flex flex-col sm:flex-row justify-between items-center bg-white p-6 rounded-2xl shadow-sm border border-slate-200 gap-4">
                  <div>
                    <h2 className="text-xl font-bold text-slate-800">Lembar Kerja Peserta Didik (LKPD)</h2>
                    <p className="text-sm text-slate-500">Praktik / Diskusi Berbasis Proyek</p>
                  </div>
                  <div className="flex gap-2 w-full sm:w-auto">
                    {generatedLKPD && <button onClick={() => exportDocumentFromDOM('doc-lkpd', `LKPD_${identitas.mapel}`)} className="px-4 py-2 bg-emerald-50 text-emerald-700 border border-emerald-200 rounded-xl text-sm font-bold flex items-center gap-2"><FileDown size={16}/> Ekspor Word</button>}
                    <button onClick={handleGenerateLKPD} disabled={loading} className="w-full sm:w-auto bg-emerald-600 text-white font-bold px-6 py-3 rounded-xl flex items-center justify-center gap-2 shadow-sm disabled:opacity-70">
                      {loading ? <><Loader2 size={18} className="animate-spin"/> Menyusun LKPD...</> : <><ClipboardList size={18}/> Generate LKPD</>}
                    </button>
                  </div>
                </div>

                {!generatedLKPD && !loading && (
                  <div className="bg-white rounded-2xl border-2 border-dashed border-slate-200 p-16 flex flex-col items-center justify-center text-center">
                    <ClipboardList size={48} className="text-slate-300 mb-4" />
                    <h3 className="text-xl font-bold text-slate-700 mb-2">Belum Ada LKPD</h3>
                    <p className="text-slate-500 text-sm max-w-sm">Klik tombol "Generate LKPD" di atas untuk menyusun aktivitas proyek atau eksperimen siswa berdasarkan materi Anda.</p>
                  </div>
                )}

                {generatedLKPD && !loading && (
                  <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-8">
                    <div id="doc-lkpd">
                      <div className="text-center mb-8 border-b border-slate-100 pb-6">
                        <h1 className="text-2xl font-black text-slate-800 mb-2 uppercase">{generatedLKPD.judul_lkpd}</h1>
                        <p className="text-slate-600 text-sm">Nama Kelompok: _________________________ &nbsp;&nbsp;&nbsp; Kelas: {identitas.kelas} &nbsp;&nbsp;&nbsp; Semester: {identitas.semester}</p>
                        <p className="text-slate-600 text-sm font-semibold mt-1">Alokasi Waktu: {identitas.jumlahPertemuan}</p>
                      </div>
                      
                      <div className="space-y-6">
                        <section className="bg-emerald-50 border border-emerald-200 p-4 rounded-xl">
                          <h3 className="font-bold text-emerald-800 mb-2">A. Tujuan Pembelajaran</h3>
                          <ul className="list-disc pl-5 text-sm text-emerald-900 space-y-1" dir="auto">
                            {generatedLKPD.tujuan_pembelajaran.map((t, i) => <li key={i}>{t}</li>)}
                          </ul>
                        </section>

                        {generatedLKPD.alat_dan_bahan?.length > 0 && (
                          <section>
                            <h3 className="font-bold text-slate-800 border-l-4 border-emerald-500 pl-3 mb-3">B. Alat dan Bahan</h3>
                            <ul className="list-decimal pl-5 text-sm text-slate-700 space-y-1" dir="auto">
                              {generatedLKPD.alat_dan_bahan.map((t, i) => <li key={i}>{t}</li>)}
                            </ul>
                          </section>
                        )}

                        <section>
                          <h3 className="font-bold text-slate-800 border-l-4 border-emerald-500 pl-3 mb-3">C. Langkah Kerja</h3>
                          <ol className="list-decimal pl-5 text-sm text-slate-700 space-y-2" dir="auto">
                            {generatedLKPD.langkah_kerja.map((t, i) => <li key={i} className="pl-1">{t}</li>)}
                          </ol>
                        </section>

                        <section className="mt-8 border-t border-slate-200 pt-6">
                          <h3 className="font-bold text-slate-800 mb-4">D. Mari Berdiskusi!</h3>
                          <div className="space-y-4">
                            {generatedLKPD.pertanyaan_diskusi.map((q, i) => (
                              <div key={i} className="space-y-2">
                                <p className="text-sm font-medium text-slate-800" dir="auto">{i+1}. {q}</p>
                                <div className="h-20 bg-slate-50 border border-slate-200 rounded-lg w-full border-dashed"></div>
                              </div>
                            ))}
                          </div>
                        </section>

                        <section className="mt-8 border-t border-slate-200 pt-6">
                          <h3 className="font-bold text-slate-800 mb-4">E. Kesimpulan</h3>
                          <p className="text-sm text-slate-600 mb-2" dir="auto">{generatedLKPD.kesimpulan}</p>
                          <div className="h-24 bg-slate-50 border border-slate-200 rounded-lg w-full border-dashed"></div>
                        </section>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            )}

          </main>

          {/* MODAL ERROR CUSTOM */}
          {errorMessage && (
            <div className="fixed inset-0 z-[100] flex items-center justify-center bg-slate-900/50 backdrop-blur-sm p-4">
                <div className="bg-white rounded-2xl p-6 max-w-md w-full shadow-2xl border border-red-100">
                    <div className="flex items-center gap-3 text-red-600 mb-4 border-b border-red-50 pb-3">
                        <div className="bg-red-100 p-2 rounded-full shrink-0"><BrainCircuit size={24}/></div>
                        <h3 className="text-lg font-bold leading-tight">Terjadi Kesalahan</h3>
                    </div>
                    <div className="text-sm text-slate-700 mb-6 bg-slate-50 p-3 rounded-xl border border-slate-200">
                        {errorMessage}
                    </div>
                    <button onClick={() => setErrorMessage('')} className="w-full py-3 bg-red-600 text-white font-bold rounded-xl hover:bg-red-700 transition">Tutup & Perbaiki</button>
                </div>
            </div>
          )}

        </div>
      );
    }

    const rootElement = document.getElementById('root');
    const root = createRoot(rootElement);
    root.render(<App />);
  </script>
</body>
</html>
